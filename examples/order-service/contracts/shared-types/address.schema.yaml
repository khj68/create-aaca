schema:
  name: Address
  version: "1.0.0"
  description: >
    Represents a postal/shipping address. Used for delivery addresses on orders
    and billing addresses on payment methods.

type: object
required: [street, city, state, zip, country]
properties:
  street:
    type: string
    minLength: 1
    maxLength: 200
    description: Street address including unit/apartment number if applicable.
    examples: ["123 Main St", "456 Oak Ave, Apt 2B"]
  city:
    type: string
    minLength: 1
    maxLength: 100
    description: City or municipality name.
    examples: ["San Francisco", "New York"]
  state:
    type: string
    minLength: 1
    maxLength: 100
    description: State, province, or region.
    examples: ["CA", "NY", "Ontario"]
  zip:
    type: string
    pattern: "^[A-Z0-9 -]{3,10}$"
    description: Postal or ZIP code.
    examples: ["94102", "10001", "M5V 2T6"]
  country:
    type: string
    pattern: "^[A-Z]{2}$"
    description: ISO 3166-1 alpha-2 country code.
    examples: ["US", "CA", "GB"]

typescript_equivalent: |
  interface Address {
    street: string;
    city: string;
    state: string;
    zip: string;
    country: string;  // ISO 3166-1 alpha-2
  }
