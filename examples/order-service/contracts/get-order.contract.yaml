contract:
  name: get-order
  version: "1.0.0"
  description: >
    Retrieves an existing order by its unique identifier. Returns the full
    order details including items, pricing, status, and delivery estimate.

input:
  type: object
  required: [order_id]
  properties:
    order_id:
      type: string
      format: uuid
      description: Unique identifier of the order to retrieve.

output:
  type: object
  properties:
    order_id:
      type: string
      format: uuid
    customer_id:
      type: string
      format: uuid
    status:
      type: string
      enum: [confirmed, processing, shipped, delivered, cancelled]
    items:
      type: array
      items:
        type: object
        properties:
          item_id: { type: string }
          name: { type: string }
          quantity: { type: integer, minimum: 1 }
          price_cents: { type: integer, minimum: 0 }
    pricing:
      type: object
      properties:
        subtotal_cents: { type: integer }
        discount_cents: { type: integer }
        tax_cents: { type: integer }
        total_cents: { type: integer }
    payment_method_id:
      type: string
    estimated_delivery:
      type: string
      format: date
    created_at:
      type: string
      format: date-time

errors:
  - code: ORDER_NOT_FOUND
    http_status: 404
    description: No order exists with the given order_id.
    resolution: Verify the order_id is correct.

side_effects: []

invariants:
  pre:
    - order_id must be a valid, non-empty string.
  post:
    - Response matches the persisted order state exactly.
    - No state is modified (read-only operation).

examples:
  - name: Successful retrieval
    input:
      order_id: "ord-20251120-001"
    output:
      order_id: "ord-20251120-001"
      customer_id: "cust-001"
      status: "confirmed"
      items:
        - item_id: "item-001"
          name: "Mechanical Keyboard"
          quantity: 1
          price_cents: 5000
      pricing:
        subtotal_cents: 5000
        discount_cents: 1000
        tax_cents: 800
        total_cents: 4800
      payment_method_id: "pm-visa-42"
      estimated_delivery: "2025-11-27"
      created_at: "2025-11-20T14:30:00Z"

  - name: Order not found
    input:
      order_id: "nonexistent-id"
    error:
      code: ORDER_NOT_FOUND
      message: "Order nonexistent-id not found"
